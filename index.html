<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectFlow</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="logo">ProjectFlow</div>
      <nav>
        <a href="#">Dashboard</a>
        <a href="#">Settings</a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main">

      <!-- PAGE HEADING ROW -->
      <div id="heading-row">
        <button id="hamburger-btn">☰</button>
        <div>
          <h1>Dashboard</h1>
          <p>Manage your tasks</p>
        </div>
        <button id="add-task-btn">+ Add Task</button>
      </div>

      <!-- MOBILE POPOVER MENU -->
      <div id="mobile-menu">
        <a href="#">Dashboard</a>
        <a href="#">Settings</a>
      </div>

      <!-- STATS CARDS -->
      <div id="stats">
        <div class="stat-card">
          <p>Total Tasks</p>
          <h2 id="stat-total">0</h2>
        </div>
        <div class="stat-card">
          <p>In Progress</p>
          <h2 id="stat-inprogress">0</h2>
        </div>
        <div class="stat-card">
          <p>Completed</p>
          <h2 id="stat-done">0</h2>
        </div>
        <div class="stat-card">
          <p>Overdue</p>
          <h2 id="stat-overdue">0</h2>
        </div>
      </div>

      <!-- TASKS SECTION -->
      <div id="tasks-section">

        <!-- SEARCH + SORT ROW -->
        <div id="controls-row">
          <input type="text" id="search-input" placeholder="Search tasks..." />
          <div id="sort-wrapper">
            <button id="sort-btn">Sort</button>
            <div id="sort-menu">
              <button class="sort-option" data-sort="date">Date</button>
              <button class="sort-option" data-sort="priority">Priority</button>
              <button class="sort-option" data-sort="name">Name</button>
            </div>
          </div>
        </div>

        <!-- TABS -->
        <div id="tabs">
          <button class="tab active-tab" data-status="all">All</button>
          <button class="tab" data-status="todo">To Do</button>
          <button class="tab" data-status="in-progress">In Progress</button>
          <button class="tab" data-status="done">Completed</button>
        </div>

        <!-- TASK CARDS GRID -->
        <div id="task-container"></div>

      </div>

    </main>

    <!-- ADD TASK MODAL -->
    <div id="modal-overlay">
      <div id="modal">
        <div id="modal-header">
          <h2>Add Task</h2>
          <button id="modal-close">✕</button>
        </div>

        <input type="text" id="input-name" placeholder="Task name *" />
        <textarea id="input-desc" placeholder="Description"></textarea>

        <select id="input-priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <select id="input-status">
          <option value="todo">To Do</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Completed</option>
        </select>

        <input type="date" id="input-date" />

        <div id="modal-buttons">
          <button id="modal-cancel">Cancel</button>
          <button id="modal-submit">Add Task</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
